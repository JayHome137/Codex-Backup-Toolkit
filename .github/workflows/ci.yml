name: CI

on:
  push:
  pull_request:

jobs:
  macos-test:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Syntax check shell scripts
        run: |
          for script in scripts/*.sh tests/*.sh; do
            zsh -n "$script"
          done

      - name: Run open-source framework checks
        run: ./tests/test-open-source-framework.sh

      - name: Run config guide checks
        run: ./tests/test-config-guide.sh

      - name: Run restore plan check
        run: ./tests/test-restore-plan.sh

      - name: Run local backup e2e
        run: ./tests/test-local-e2e.sh

      - name: Install age for encryption test
        run: brew install age

      - name: Run encrypted backup e2e
        run: ./tests/test-encryption-e2e.sh

      - name: Run isolated launchd validate check
        run: ./tests/test-install-validate.sh

      - name: Run retention check
        run: ./tests/test-retention.sh

      - name: Run remote latest restore check
        run: ./tests/test-remote-latest-restore.sh

      - name: Run remote retention check
        run: ./tests/test-remote-retention.sh

      - name: Run WebDAV doctor check
        run: ./tests/test-webdav-doctor.sh

      - name: Run local authoritative sync check
        run: ./tests/test-sync-local-authoritative.sh

      - name: Run scheduled sync mode check
        run: ./tests/test-scheduled-sync-mode.sh

      - name: Run profile path plan check
        run: ./tests/test-profile-plan.sh

      - name: Run Windows preview checks
        run: ./tests/test-windows-preview.sh

      - name: Run local helper tests
        run: node --test helper/*.test.mjs

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Run GUI tests
        working-directory: gui
        run: npm test

      - name: Build GUI
        working-directory: gui
        run: npm run build

      - name: Check macOS desktop build environment
        working-directory: gui
        run: npm run desktop:doctor

      - name: Build macOS desktop app
        working-directory: gui
        run: npm run desktop:build

      - name: Check macOS desktop checksum
        working-directory: gui
        run: npm run desktop:checksum

      - name: Smoke check macOS desktop bundle
        working-directory: gui
        run: npm run desktop:smoke

      - name: Smoke check macOS release layout
        run: ./tests/test-macos-release-smoke.sh

  windows-native:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Windows native preview checks
        shell: pwsh
        run: .\tests\windows-native.ps1

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Build Windows desktop installer
        working-directory: gui
        shell: pwsh
        run: |
          $lastExitCode = 1
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            npm run desktop:build:windows
            $lastExitCode = $LASTEXITCODE
            if ($lastExitCode -eq 0) {
              exit 0
            }
            Write-Warning "Windows desktop installer build failed on attempt $attempt with exit code $lastExitCode. Retrying after a short delay."
            Start-Sleep -Seconds (15 * $attempt)
          }
          exit $lastExitCode

      - name: Smoke check Windows desktop installer
        working-directory: gui
        run: npm run desktop:smoke:windows-installer

      - name: Smoke check Windows install layout
        shell: pwsh
        run: .\tests\windows-install-smoke.ps1

      - name: Upload Windows desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: codexbackup-windows-installers
          path: |
            gui/src-tauri/target/release/bundle/**/*.msi
            gui/src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error
