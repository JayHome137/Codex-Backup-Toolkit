name: Feature request
description: Suggest a new target, profile, restore feature, or GUI improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should Codex-Backup-toolkit help with?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What behavior or interface do you want?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Relevant storage target, OS version, or workflow details.
