name: Bug report
description: Report a problem with backup, restore, automation, or target publishing.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Backup target
      options:
        - local
        - smb
        - webdav
        - rclone
        - restore
        - launchd automation
        - other
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste `./scripts/codexbackup.sh --doctor` output after removing private values.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs after removing private values.
      render: text
